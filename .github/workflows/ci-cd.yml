name: CI/CD Pipeline
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

     
      - name: Run Lint
        run: npm run lint
        continue-on-error: true


      - name: Run Tests
        run: npm run test
        continue-on-error: true # 

    
      - name: Build project
        run: npm run build